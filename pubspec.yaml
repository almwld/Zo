name: project_zion
description: Kali Linux Mobile Penetration Testing Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.7
  share_plus: ^7.2.1
  pdf: ^3.10.7
  printing: ^5.11.1
  intl: ^0.18.1
  fl_chart: ^0.65.0
  google_fonts: ^6.1.0
  json_annotation: ^4.8.1
  connectivity_plus: ^5.0.2
  package_info_plus: ^5.0.1
  url_launcher: ^6.2.1
  path: ^1.8.3
  crypto: ^3.0.3
