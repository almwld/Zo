name: project_zion
description: Zion OS - نظام تشغيل للاختراق
version: 3.3.0+10

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  speech_to_text: ^6.6.0
  flutter_local_notifications: ^16.3.0
  webview_flutter: ^4.4.0
  flutter:
    sdk: flutter
  provider: ^6.1.1
  font_awesome_flutter: ^10.6.0
  flutter_riverpod: ^2.4.9
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  permission_handler: ^11.0.1
  connectivity_plus: ^5.0.2
  network_info_plus: ^4.0.0
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  http: ^1.1.0
  intl: ^0.18.1
  url_launcher: ^6.2.1
  share_plus: ^7.2.1

dev_dependencies:
  speech_to_text: ^6.6.0
  flutter_local_notifications: ^16.3.0
  webview_flutter: ^4.4.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/icons/svg/
    - assets/images/
    - assets/fonts/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
