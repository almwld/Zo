<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="64" height="64">
  <defs>
    <linearGradient id="bathGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00BCD4;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0097A7;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glass">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode/>
      </feMerge>
    </filter>
  </defs>
  <rect x="2" y="4" width="20" height="16" rx="2" ry="2" fill="url(#bathGrad)" opacity="0.2"/>
  <polyline points="8 12 12 16 16 12" stroke="url(#bathGrad)" stroke-width="1.5" fill="none"/>
  <line x1="6" y1="8" x2="12" y2="8" stroke="url(#bathGrad)" stroke-width="1.5"/>
  <circle cx="18" cy="8" r="1.5" fill="#00E5FF" opacity="0.6"/>
  <circle cx="18" cy="16" r="1" fill="#00E5FF" opacity="0.4"/>
</svg>
