name: project_zion
description: Zion OS - نظام تشغيل متكامل للاختراق والأمان
version: 4.5.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  provider: ^6.1.1
  font_awesome_flutter: ^10.6.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  
  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  flutter_secure_storage: ^9.0.0
  
  # Network
  http: ^1.1.0
  connectivity_plus: ^5.0.2
  network_info_plus: ^4.0.0
  
  # Security & Biometric
  crypto: ^3.0.3
  permission_handler: ^11.0.1
  local_auth: ^2.1.6
  
  # Device Info
  device_info_plus: ^9.1.0
  battery_plus: ^5.0.0
  
  # Media
  image_picker: ^1.0.4
  video_player: ^2.8.1
  
  # Charts
  fl_chart: ^0.68.0
  
  # WebView
  webview_flutter: ^4.4.0
  
  # Internationalization
  intl: ^0.19.0
  easy_localization: ^3.0.3
  flutter_localizations:
    sdk: flutter
  
  # Utils
  url_launcher: ^6.2.1
  share_plus: ^7.2.1
  flutter_colorpicker: ^1.0.3
  flutter_local_notifications: ^16.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/icons/svg/
    - assets/icons/svg_colors/
    - assets/images/
    - assets/fonts/
    - assets/translations/
    - assets/wallpapers/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
